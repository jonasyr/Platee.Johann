sonar.projectKey=jonasyr_Platee.Johann
sonar.organization=gitray-org

# Test sources — SonarCloud treats these as test files (not production code)
sonar.tests=Platee.Johann.Tests

# Exclude non-production paths from analysis
sonar.exclusions=\
  .github/**,\
  scripts/**,\
  docs/**,\
  **/*.md,\
  **/bin/**,\
  **/obj/**

# Exclude test code from coverage calculation
sonar.coverage.exclusions=\
  Platee.Johann.Tests/**

# Coverage report (OpenCover via coverlet)
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
